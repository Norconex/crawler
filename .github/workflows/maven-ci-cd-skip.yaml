# Companion to "maven-ci-cd.yaml".
#
# The "build" job is a REQUIRED status check on protected branches. When a pull
# request changes ONLY files excluded from the build (the "paths" list below
# mirrors the "paths-ignore" list in maven-ci-cd.yaml), the real workflow is
# skipped and never reports a "build" status. GitHub then leaves the PR stuck on
# "Expected - Waiting for status to be reported" forever (a required check has no
# timeout). This lightweight workflow reports a successful "build" check for such
# documentation-only PRs so they are not blocked indefinitely.
#
# maven-ci-cd.yaml (paths-ignore) and this file (paths) are mutually exclusive
# for any PR that changes at least one buildable file, so the real build is never
# masked. The job name MUST remain "build" to satisfy the required status check.
name: Maven CI/CD Workflow (no-build)

on:
  pull_request:
    branches:
      - "*"
    types: [opened, synchronize, reopened]
    paths:
      - "V4_MIGRATION.md"
      - "**/README.md"
      - "**/TODO.txt"
      - "docs/**"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Report build not required
        run: >
          echo "Only build-excluded files changed;
          reporting required 'build' check as successful."
